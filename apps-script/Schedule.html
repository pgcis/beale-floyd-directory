    border-bottom: 3px solid transparent; cursor: pointer;
    text-decoration: none;

  .page-nav-item.active {
    border-bottom-color: var(--accent);
  }
  .page-nav-item.inactive {
    color: #99aabb; font-weight: 500; border-bottom: 3px solid transparent;
    cursor: default;
  }
  .page-nav-item:not(.inactive):hover {
    color: #667788; border-bottom-color: #e0e4e8;
  }
  .page-nav-item.active:hover {
    color: var(--primary); border-bottom-color: var(--accent);
  }

  .container { max-width: 1200px; margin: 20px auto; padding: 0 16px; }

  /* Controls bar */
  .controls {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding: 12px 16px; background: #fff;

  .view-toggle { display: flex; gap: 4px; flex-wrap: wrap; }

  .legend-dot.in-progress { background: #2196F3; }
  .legend-dot.at-risk { background: #ff9800; }
  .legend-dot.delayed { background: #f44336; }
  .legend-dot.complete { background: #4caf50; }

    margin-bottom: 16px; overflow: hidden;
  }
  .gantt-section-header {

    letter-spacing: 0.8px; border-bottom: 2px solid #e8ecf0;

// ===== UTILITIES =====
function parseDate(s) {
  if (!s) return null;
  const parts = s.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function formatDateDisplay(s) {
  if (!s) return '';
  const d = parseDate(s);
  if (!d) return s;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function statusClass(status) {
  if (!status) return 'not-started';
  const s = status.toLowerCase().trim();
  if (s === 'in progress') return 'in-progress';
  if (s === 'at risk') return 'at-risk';
  if (s === 'delayed') return 'delayed';
  if (s === 'complete') return 'complete';
  return 'not-started';
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getMonthsBetween(startStr, endStr) {
  const start = parseDate(startStr);
  const end = parseDate(endStr);
  const months = [];
  const current = new Date(start.getFullYear(), start.getMonth(), 1);
  while (current <= end) {
    months.push(new Date(current));
    current.setMonth(current.getMonth() + 1);
  }
  return months;
}

function getMonthLabel(d) {
  const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const label = monthNames[d.getMonth()];
  // Show year suffix on Jan or first month of view
  if (d.getMonth() === 0 || d.getMonth() === 3) {
    return label + ' ' + String(d.getFullYear()).slice(2);
  }
  return label;
}

function getBarPosition(itemStart, itemEnd, viewStart, viewEnd) {
  const vs = parseDate(viewStart).getTime();
  const ve = parseDate(viewEnd).getTime();
  const is = parseDate(itemStart).getTime();
  const ie = parseDate(itemEnd).getTime();
  const totalRange = ve - vs;
  if (totalRange <= 0) return null;

  const leftPct = Math.max(0, (is - vs) / totalRange * 100);
  const rightPct = Math.min(100, (ie - vs) / totalRange * 100);
  const widthPct = rightPct - leftPct;

  if (widthPct <= 0 || leftPct >= 100 || rightPct <= 0) return null;
  return { left: leftPct, width: widthPct };
}

function getTodayPosition(viewStart, viewEnd) {
  const vs = parseDate(viewStart).getTime();
  const ve = parseDate(viewEnd).getTime();
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const totalRange = ve - vs;
  if (totalRange <= 0) return null;
  const pct = (today - vs) / totalRange * 100;
  if (pct < 0 || pct > 100) return null;
  return pct;
}

function computeSectionStats(rows) {
  let complete = 0, atRisk = 0, delayed = 0;
  rows.forEach(r => {
    const s = (r.Status || '').toLowerCase().trim();
    if (s === 'complete') complete++;
    if (s === 'at risk') atRisk++;
    if (s === 'delayed') delayed++;
  });
  const parts = [];
  parts.push(complete + ' of ' + rows.length + ' complete');
  if (atRisk > 0) parts.push(atRisk + ' at risk');
  if (delayed > 0) parts.push(delayed + ' delayed');
  return parts.join(' | ');
}

// ===== RENDERING =====
function renderControls() {
  const viewNames = Object.keys(VIEW_RANGES);
  const btns = viewNames.map(name =>
    `<div class="view-btn ${name === currentView ? 'active' : ''}" onclick="switchView('${name}')">${name}</div>`
  ).join('');

  return `
    <div class="controls">
      <div class="view-toggle">${btns}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot not-started"></div> Not Started</div>
        <div class="legend-item"><div class="legend-dot in-progress"></div> In Progress</div>
        <div class="legend-item"><div class="legend-dot at-risk"></div> At Risk</div>
        <div class="legend-item"><div class="legend-dot delayed"></div> Delayed</div>
        <div class="legend-item"><div class="legend-dot complete"></div> Complete</div>
      </div>
    </div>`;
}

function renderTimelineHeader(label) {
  const range = VIEW_RANGES[currentView];
  const months = getMonthsBetween(range.start, range.end);
  const now = new Date();
  const currentMonth = now.getFullYear() * 12 + now.getMonth();

  const monthCells = months.map(m => {
    const mKey = m.getFullYear() * 12 + m.getMonth();
    const isCurrent = mKey === currentMonth;
    return `<div class="timeline-month ${isCurrent ? 'current' : ''}">${getMonthLabel(m)}</div>`;
  }).join('');

  return `
    <div class="timeline-header">
      <div class="timeline-label">${label}</div>
      <div class="timeline-months">${monthCells}</div>
    </div>`;
}

function renderTodayMarker(showLabel) {
  const range = VIEW_RANGES[currentView];
  const pct = getTodayPosition(range.start, range.end);
  if (pct === null) return '';
  const labelHtml = showLabel ? `<div class="today-label">Today</div>` : '';
  return `<div class="today-marker" style="left:${pct.toFixed(2)}%;">${labelHtml}</div>`;
}

function renderGanttRow(item, index, type) {
  const range = VIEW_RANGES[currentView];
  const pos = getBarPosition(item.Start, item.End, range.start, range.end);
  const sc = statusClass(item.Status);
  const hasNote = item.Notes && item.Notes.trim().length > 0;
  const progress = parseInt(item.Progress) || 0;
  const barLabel = item.Name && pos && pos.width > 8 ? escapeHtml(item.Name) : '';

  let barHtml = '';
  if (pos) {
    const progressBar = progress > 0 ? `<div class="gantt-bar-progress" style="width:${progress}%;"></div>` : '';
    barHtml = `<div class="gantt-bar ${sc} ${hasNote ? 'has-note' : ''}"
      style="left:${pos.left.toFixed(2)}%; width:${pos.width.toFixed(2)}%;"
      onclick="showDetail('${type}', ${index}); event.stopPropagation();">
      ${progressBar}
      <span style="position:relative;z-index:1;">${barLabel}</span>
    </div>`;
  }

  // Show today marker only on first row of each section
  const todayHtml = index === 0 ? renderTodayMarker(type === 'pgcis') : renderTodayMarker(false);

  return `
    <div class="gantt-row" onclick="showDetail('${type}', ${index})">
      <div class="gantt-label">
        <div>${escapeHtml(item.Name)}<br><span class="owner">${escapeHtml(item.Owner)}</span></div>
      </div>
      <div class="gantt-bars">
        ${todayHtml}
        ${barHtml}
      </div>
    </div>`;
}

function renderGanttSection(title, rows, type, labelCol) {
  const stats = computeSectionStats(rows);
  const rowsHtml = rows.map((r, i) => renderGanttRow(r, i, type)).join('');

  return `
    <div class="gantt-section">
      <div class="gantt-section-header">
        ${escapeHtml(title)}
        <span class="gantt-section-count">${stats}</span>
      </div>
      ${renderTimelineHeader(labelCol)}
      ${rowsHtml}
    </div>`;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <div class="container">
      ${renderControls()}
      ${renderGanttSection('PGCIS Deliverables', pgcisRows, 'pgcis', 'Deliverable')}
      ${renderGanttSection('Construction Schedule', constructionRows, 'construction', 'Milestone')}
    </div>
    ${renderFooter()}`;
}

// ===== VIEW SWITCHING =====
function switchView(viewName) {
  currentView = viewName;
  render();
}
window.switchView = switchView;

// ===== DETAIL POPUP =====
function showDetail(type, index) {
  const rows = type === 'pgcis' ? pgcisRows : constructionRows;
  const item = rows[index];
  if (!item) return;

  const sc = statusClass(item.Status);
  const statusLabel = item.Status || 'Not Started';
  const progress = parseInt(item.Progress) || 0;

  let metaRows = '';
  metaRows += `<div class="detail-row"><div class="detail-label">Owner</div><div class="detail-value">${escapeHtml(item.Owner)}</div></div>`;

  if (type === 'pgcis' && item.Workstream) {
    metaRows += `<div class="detail-row"><div class="detail-label">Workstream</div><div class="detail-value">${escapeHtml(item.Workstream)}</div></div>`;
  }
  if (type === 'pgcis' && item.Phase) {
    metaRows += `<div class="detail-row"><div class="detail-label">Phase</div><div class="detail-value">${escapeHtml(item.Phase)}</div></div>`;
  }

  metaRows += `<div class="detail-row"><div class="detail-label">Start</div><div class="detail-value">${formatDateDisplay(item.Start)}</div></div>`;
  metaRows += `<div class="detail-row"><div class="detail-label">Target</div><div class="detail-value">${formatDateDisplay(item.End)}</div></div>`;
  metaRows += `<div class="detail-row"><div class="detail-label">Progress</div><div class="detail-value">${progress}%</div></div>`;

  if (item.Notes && item.Notes.trim()) {
    metaRows += `<div class="detail-row"><div class="detail-label">Notes</div><div class="detail-value">${escapeHtml(item.Notes)}</div></div>`;
  }

  const docLink = item['Doc Link'] || '';
  if (docLink && docLink.trim()) {
    metaRows += `<div class="detail-row"><div class="detail-label">Document</div><div class="detail-value"><a href="${escapeHtml(docLink)}" target="_blank" class="detail-link">Open in Google Drive</a></div></div>`;
  }

  const html = `
    <div class="detail-overlay" onclick="if(event.target===this)this.remove()">
      <div class="detail-card">
        <button class="close-btn" onclick="this.closest('.detail-overlay').remove()">&times;</button>
        <div class="status-badge ${sc}">${escapeHtml(statusLabel)}</div>
        <div class="detail-name">${escapeHtml(item.Name)}</div>
        <div class="detail-meta">${metaRows}</div>
      </div>
    </div>`;

  // Remove any existing overlay
  const existing = document.querySelector('.detail-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
}
window.showDetail = showDetail;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  render();
});
</script>

<div id="app"></div>

</body>
</html>
